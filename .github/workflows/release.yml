name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from build.gradle.kts
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | sed 's/.*versionName = "\(.*\)"/\1/' | tr -d '[:space:]')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | sed 's/.*versionCode = \([0-9]*\).*/\1/' | tr -d '[:space:]')
          TAG="v${VERSION_NAME}"
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Tag: ${TAG}"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git tag --list | grep -q "^${{ steps.version.outputs.tag }}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.tag }} already exists, skipping release."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.tag }} does not exist, proceeding with release."
          fi

      - name: Get previous tag
        id: prev_tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            echo "prev_tag=" >> $GITHUB_OUTPUT
            echo "No previous tag found."
          else
            echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT
            echo "Previous tag: ${PREV_TAG}"
          fi

      - name: Generate release notes
        id: release_notes
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG="${{ steps.prev_tag.outputs.prev_tag }}"

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="- No changes recorded"
          fi

          {
            echo "notes<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: \`${PREV_TAG}\` → \`${TAG}\`"
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create release tag and publish
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: false
